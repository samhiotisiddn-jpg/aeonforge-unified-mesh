name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: read

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: actions/dependabot-v2@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for required checks
        uses: actions/checkout@v4

      - name: Enable auto-merge for Dependabot PRs
        run: |
          gh pr merge --admin --merge || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  auto-merge:
    runs-on: ubuntu-latest
    needs: [dependabot]
    if: needs.dependabot.result == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Merge Dependabot PR
        run: |
          PR_NUMBER=$(gh pr list --author="dependabot[bot]" --state=open --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            gh pr merge --squash --delete-branch --auto --repo ${{ github.repository }} $PR_NUMBER
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  auto-approve:
    runs-on: ubuntu-latest
    steps:
      - name: Approve Dependabot PR
        if: github.actor == 'dependabot[bot]'
        run: |
          PR_NUMBER=$(gh pr list --author="dependabot[bot]" --state=open --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            gh pr review $PR_NUMBER --approve --repo ${{ github.repository }}
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
